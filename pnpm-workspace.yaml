packages:
  - 'packages/tokens'
  - 'packages/docusaurus'
  - 'templates/docusaurus'
  - 'docs'

# Substitute @ktdocs/* deps with the workspace versions for local builds.
overrides:
  '@ktdocs/docusaurus-preset': workspace:*
  '@ktdocs/tokens': workspace:*

# Postinstall scripts disabled for these deps — they aren't needed at runtime
# (style-dictionary's script is a noop for our usage; glob's is unrelated).
allowBuilds:
  '@bundled-es-modules/glob': false
  style-dictionary: false
