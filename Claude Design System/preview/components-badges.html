<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .group { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="row"><span class="lab">Badges</span>
      <span class="badge"><span class="dot"></span>Neutral</span>
      <span class="badge badge-purple"><span class="dot"></span>Stable</span>
      <span class="badge badge-pink"><span class="dot"></span>Preview</span>
      <span class="badge badge-success"><span class="dot"></span>Deployed</span>
      <span class="badge badge-warning"><span class="dot"></span>Deprecated</span>
      <span class="badge badge-danger"><span class="dot"></span>Removed</span>
      <span class="badge badge-info"><span class="dot"></span>New</span>
    </div>
    <div class="row"><span class="lab">Tags</span>
      <span class="tag">kotlin</span>
      <span class="tag">coroutines</span>
      <span class="tag">v2.4.0</span>
      <span class="tag">android</span>
      <span class="tag">multiplatform</span>
      <span class="tag">tutorial</span>
    </div>
    <div class="row"><span class="lab">Methods</span>
      <span class="method method-get">GET</span>
      <span class="method method-post">POST</span>
      <span class="method method-put">PUT</span>
      <span class="method method-patch">PATCH</span>
      <span class="method method-delete">DELETE</span>
    </div>
  </div>
</div>
</body>
</html>
