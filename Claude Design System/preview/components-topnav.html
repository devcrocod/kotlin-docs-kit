<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: var(--surface-2); }
  .card { padding: 0; }
  .wrap { background: var(--surface-1); border-radius: 10px; overflow: hidden; margin: 16px; border: 1px solid var(--border-1); }
</style>
</head>
<body>
<div class="card">
  <div class="wrap">
    <header class="topnav" style="position:static">
      <a class="brand" href="#">
        <img src="../assets/kotlin-icon-color.svg" width="26" height="26" alt=""/>
        <span class="brand-name">Kotlin</span>
        <span class="nav-version">v2.0.0</span>
      </a>
      <nav class="navlinks">
        <a class="navlink is-active">Docs</a>
        <a class="navlink">API</a>
        <a class="navlink">Playground</a>
        <a class="navlink">Community</a>
        <a class="navlink">Blog</a>
      </nav>
      <div class="nav-right">
        <div class="docs-search" style="width: 220px;">
          <svg class="ds-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <span class="ds-text">Search docs</span>
          <span class="ds-kbd">⌘K</span>
        </div>
        <button class="icon-btn" title="GitHub">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        </button>
        <button class="icon-btn" title="Theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>
  </div>
</div>
</body>
</html>
