<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box  { width: 72px; height: 72px; background: var(--kt-purple-100); border: 1px solid var(--kt-purple-300); }
  .lab  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .px   { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  h4 { font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 16px; }
</style>
</head>
<body>
<div class="card">
  <h4>Radius — compact, documentation-tuned</h4>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">--radius-sm</span><span class="px">4 · tags, pills</span></div>
    <div class="tile"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">--radius-md</span><span class="px">6 · buttons, inputs, callouts</span></div>
    <div class="tile"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">--radius-lg</span><span class="px">8 · cards, code blocks</span></div>
    <div class="tile"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">--radius-xl</span><span class="px">12 · modals, hero</span></div>
    <div class="tile"><div class="box" style="border-radius:var(--radius-full)"></div><span class="lab">--radius-full</span><span class="px">∞ · badges</span></div>
  </div>
</div>
</body>
</html>
