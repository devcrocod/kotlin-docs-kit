<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .scale { display: grid; grid-template-columns: repeat(14, 1fr); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-1); }
  .step { height: 60px; display: flex; align-items: flex-end; justify-content: center; padding: 5px 0; font-family: var(--font-mono); font-size: 10px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--fg-1); }
  .hint { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
<div class="card">
  <div class="head"><span class="name">Neutrals</span><span class="hint">cool gray · used for surfaces, borders, text</span></div>
  <div class="scale">
    <div class="step" style="background:var(--gray-0);   color:var(--gray-700); border-right:1px solid var(--border-1)">0</div>
    <div class="step" style="background:var(--gray-50);  color:var(--gray-700)">50</div>
    <div class="step" style="background:var(--gray-100); color:var(--gray-700)">100</div>
    <div class="step" style="background:var(--gray-150); color:var(--gray-700)">150</div>
    <div class="step" style="background:var(--gray-200); color:var(--gray-700)">200</div>
    <div class="step" style="background:var(--gray-300); color:var(--gray-800)">300</div>
    <div class="step" style="background:var(--gray-400); color:var(--gray-900)">400</div>
    <div class="step" style="background:var(--gray-500); color:white">500</div>
    <div class="step" style="background:var(--gray-600); color:white">600</div>
    <div class="step" style="background:var(--gray-700); color:white">700</div>
    <div class="step" style="background:var(--gray-800); color:white">800</div>
    <div class="step" style="background:var(--gray-850); color:white">850</div>
    <div class="step" style="background:var(--gray-900); color:white">900</div>
    <div class="step" style="background:var(--gray-950); color:white">950</div>
  </div>
</div>
</body>
</html>
