<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .word { font-family: var(--font-sans); font-weight: 600; font-size: 62px; letter-spacing: -0.02em; line-height: 1; color: var(--fg-1); margin: 0 0 14px; }
  .sample { font-family: var(--font-sans); font-size: 15px; line-height: 1.65; color: var(--fg-1); max-width: 56ch; margin-bottom: 16px; }
  .meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-top: 14px; border-top: 1px solid var(--border-1); }
  .meta .l { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.06em; text-transform: uppercase; }
  .meta .v { font-family: var(--font-sans); font-weight: 500; font-size: 14px; color: var(--fg-1); }
</style>
</head>
<body>
<div class="card">
  <div class="word">IBM Plex Sans</div>
  <p class="sample">Kobalt is a Kotlin-first server framework with file-based routing, structured concurrency, and a compiler that catches bugs before your tests do.</p>
  <div class="meta">
    <div><span class="l">Use</span><span class="v">All UI + prose</span></div>
    <div><span class="l">Weights</span><span class="v">400 · 500 · 600 · 700</span></div>
    <div><span class="l">Default</span><span class="v">15 / 1.65</span></div>
    <div><span class="l">Token</span><span class="v">--font-sans</span></div>
  </div>
</div>
</body>
</html>
