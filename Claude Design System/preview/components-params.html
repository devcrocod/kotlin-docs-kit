<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .params { margin: 0; }
  .group { display: flex; flex-direction: column; gap: 14px; }
  .topbar { display: flex; align-items: center; gap: 10px; }
  code { font-family: var(--font-mono); font-size: 13px; padding: 1px 6px; border-radius: 4px; background: var(--surface-3); border: 1px solid var(--border-1); }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="topbar">
      <span class="method method-get">GET</span>
      <code style="background:transparent; border:0; padding:0; font-size:15px; color:var(--fg-1)">/v1/projects/&#123;id&#125;</code>
    </div>
    <table class="params">
      <thead>
        <tr><th>Name</th><th>Description</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <span class="param-name">id</span>
            <span class="param-type">string</span>
            <span class="badge badge-danger" style="font-size:10px; padding:1px 6px; margin-top:4px; display:inline-flex;">required</span>
          </td>
          <td>The project's unique identifier, e.g. <code>prj_2N4kQ</code>.</td>
        </tr>
        <tr>
          <td>
            <span class="param-name">expand</span>
            <span class="param-type">string[]</span>
          </td>
          <td>Comma-separated list of relations to expand. Supported: <code>builds</code>, <code>members</code>, <code>integrations</code>.</td>
        </tr>
        <tr>
          <td>
            <span class="param-name">include_archived</span>
            <span class="param-type">boolean</span>
          </td>
          <td>Default <code>false</code>. When <code>true</code>, includes archived projects.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
