<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .scale { display: grid; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-1); }
  .pink  { grid-template-columns: repeat(7, 1fr); }
  .orange{ grid-template-columns: repeat(6, 1fr); }
  .blue  { grid-template-columns: repeat(6, 1fr); }
  .step { height: 44px; display: flex; align-items: flex-end; justify-content: center; padding: 4px 0; font-family: var(--font-mono); font-size: 10px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--fg-1); }
  .hint { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div>
      <div class="head"><span class="name">Kotlin Pink</span><span class="hint">gradient midpoint · --kt-pink-N</span></div>
      <div class="scale pink">
        <div class="step" style="background:var(--kt-pink-50); color:var(--kt-pink-700)">50</div>
        <div class="step" style="background:var(--kt-pink-100); color:var(--kt-pink-700)">100</div>
        <div class="step" style="background:var(--kt-pink-200); color:var(--kt-pink-700)">200</div>
        <div class="step" style="background:var(--kt-pink-300); color:white">300</div>
        <div class="step" style="background:var(--kt-pink-400); color:white">400</div>
        <div class="step" style="background:var(--kt-pink-500); color:white">500</div>
        <div class="step" style="background:var(--kt-pink-700); color:white">700</div>
      </div>
    </div>
    <div>
      <div class="head"><span class="name">Kotlin Orange</span><span class="hint">gradient endpoint · --kt-orange-N</span></div>
      <div class="scale orange">
        <div class="step" style="background:var(--kt-orange-50); color:var(--kt-orange-600)">50</div>
        <div class="step" style="background:var(--kt-orange-100); color:var(--kt-orange-600)">100</div>
        <div class="step" style="background:var(--kt-orange-200); color:var(--kt-orange-600)">200</div>
        <div class="step" style="background:var(--kt-orange-300); color:white">300</div>
        <div class="step" style="background:var(--kt-orange-400); color:white">400</div>
        <div class="step" style="background:var(--kt-orange-500); color:white">500</div>
      </div>
    </div>
    <div>
      <div class="head"><span class="name">Kotlin Blue</span><span class="hint">syntax + secondary · --kt-blue-N</span></div>
      <div class="scale blue">
        <div class="step" style="background:var(--kt-blue-50); color:var(--kt-blue-600)">50</div>
        <div class="step" style="background:var(--kt-blue-100); color:var(--kt-blue-600)">100</div>
        <div class="step" style="background:var(--kt-blue-200); color:var(--kt-blue-600)">200</div>
        <div class="step" style="background:var(--kt-blue-300); color:white">300</div>
        <div class="step" style="background:var(--kt-blue-400); color:white">400</div>
        <div class="step" style="background:var(--kt-blue-500); color:white">500</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
