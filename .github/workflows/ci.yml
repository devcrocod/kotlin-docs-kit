name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Prettier (JSON/YAML/MD/MDX/TS/JS)
        run: pnpm run format:check

      - name: ESLint (TS/TSX/JS/MJS)
        run: pnpm run lint

      - name: gofmt (Hugo packages)
        run: |
          out=$(gofmt -l packages/hugo templates/hugo)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            gofmt -d packages/hugo templates/hugo
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.22"
          cache: true

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: 0.163.2
          extended: true

      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install (pnpm)
        run: task install

      - name: Validate DTCG tokens
        run: pnpm --filter @ktdocs/tokens run validate

      - name: Typecheck (TypeScript packages)
        run: |
          pnpm --filter @ktdocs/docusaurus-preset typecheck
          pnpm --filter @ktdocs/docs-site typecheck
          pnpm --filter kotlin-docs-docusaurus-template typecheck

      - name: CI pipeline (tokens + templates + docs)
        run: task ci

      - name: Hugo render smoke
        working-directory: templates/hugo
        run: hugo --renderToMemory --quiet
