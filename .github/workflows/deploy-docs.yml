# Build the dogfood docs site (docs/) from the monorepo and publish it to the
# repo's own GitHub Pages at https://devcrocod.github.io/kotlin-docs-kit/.
#
# The homepage (docs/content/intro.mdx) doubles as the project landing page.
# Everything is built in-repo, so `workspace:*` deps resolve natively — no
# mirror repo, no subtree split, no workspace-protocol rewrite.
#
# Setup (one-time): Settings → Pages → Source: GitHub Actions.

name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "packages/docusaurus/**"
      - "packages/tokens/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: task docs:build

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/build

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
