# Sync the two template starters (templates/{docusaurus,hugo}/) to
# their mirror repos so that the GitHub "Use this template" button works.
# The monorepo is the source of truth; mirror repos are append-only views
# refreshed via `git subtree split` + force-push on every push to master.
#
# Implements issue #18 and SPEC §12.1. Mirrors users do NOT fork — they
# template-copy, so force-push here never rewrites consumer history.
#
# Setup (one-time, per mirror — full guide in docs/content/maintainer/mirrors.md):
#   1. Create empty public repos:
#        - devcrocod/kotlin-docs-docusaurus-template
#        - devcrocod/kotlin-docs-hugo-template
#   2. Settings → General → Template repository: ON.
#   3. Settings → Pages → Source: GitHub Actions (the deploy.yml in each
#      template auto-publishes on first push).
#   4. Mint a PAT that can write the mirrors' workflow files: a fine-grained
#      token scoped to both mirrors with Contents + Workflows: Read and write
#      (or a classic token with `public_repo` AND `workflow` scopes). The
#      `workflow` permission is required because each template ships its own
#      .github/workflows/deploy.yml. Save as monorepo secret
#      `TEMPLATES_MIRROR_TOKEN`.

name: Sync templates to mirrors

on:
  push:
    branches: [master]
    paths:
      - "templates/**"
      - "packages/hugo/**"
      - ".github/workflows/sync-templates.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # Job-level so `matrix.engine` is in scope — gives each engine its own
    # group. At workflow level `matrix` is unavailable and both legs would
    # collapse into one group, serializing the docusaurus/hugo splits.
    concurrency:
      group: sync-templates-${{ matrix.engine }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        engine: [docusaurus, hugo]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name 'ktdocs-bot'
          git config user.email 'bot@ktdocs'

      # Hugo's go.mod wires the theme to the in-repo package via a placeholder
      # require (v0.0.0-unpublished) + a replace for local dev. Both are invalid
      # outside the monorepo: the require points at a revision that doesn't
      # exist, so leaving it makes the consumer's `hugo mod get -u` fail with
      # "unknown revision packages/hugo/v0.0.0-unpublished". Strip both before
      # the subtree split; the consumer resolves the published theme over the Go
      # proxy via `hugo mod get -u` (see the template's deploy.yml).
      - name: Strip dev-only artifacts
        run: |
          if [ "${{ matrix.engine }}" = "hugo" ]; then
            sed -i \
              -e '/^require github\.com\/devcrocod\/kotlin-docs-kit\/packages\/hugo v0\.0\.0-unpublished$/d' \
              -e '/^replace github\.com\/devcrocod\/kotlin-docs-kit/d' \
              templates/hugo/go.mod
          fi

      # Fail loudly if the strip above missed the dev-only require/replace. The
      # sed is line-anchored, so any reformat of go.mod can slip past it and
      # silently republish a broken theme module (this exact regression broke
      # the Hugo demo deploy three times before the strip was fixed).
      - name: Verify go.mod was stripped
        if: matrix.engine == 'hugo'
        run: |
          if grep -qE 'v0\.0\.0-unpublished|^replace github\.com/devcrocod/kotlin-docs-kit' templates/hugo/go.mod; then
            echo "::error::templates/hugo/go.mod still has dev-only require/replace after strip"
            cat templates/hugo/go.mod
            exit 1
          fi

      # The standalone template needs a pnpm-workspace.yaml: since pnpm 11,
      # build-script policy can ONLY live there (the package.json "pnpm" field
      # is no longer read and .npmrc is auth/registry-only). Without it core-js's
      # postinstall is "unreviewed" and `pnpm install --frozen-lockfile` fails
      # the strictDepBuilds gate (ERR_PNPM_IGNORED_BUILDS) in the mirror's
      # deploy.yml. Inject it ONLY here, not in templates/docusaurus/ source: a
      # nested pnpm-workspace.yaml in the monorepo would shadow the workspace
      # root and break `task template:docusaurus:build` (the workspace:* preset
      # override stops applying). The committed standalone lockfile already
      # satisfies --frozen-lockfile with this file present (build policy is a
      # post-install gate, not a lockfile-recorded resolution setting).
      - name: Inject standalone pnpm-workspace.yaml (docusaurus)
        if: matrix.engine == 'docusaurus'
        run: |
          printf '%s\n' \
            '# Build policy for pnpm 11 (settings live here, not package.json/.npmrc).' \
            '# core-js ships a postinstall that is unnecessary at runtime; mark it' \
            '# reviewed-and-disallowed so `pnpm install` does not fail the' \
            '# strictDepBuilds gate (ERR_PNPM_IGNORED_BUILDS).' \
            'allowBuilds:' \
            '  core-js: false' \
            > templates/docusaurus/pnpm-workspace.yaml

      # `git subtree split` only sees committed history, so any edited/injected
      # file has to land in a commit first. The `|| true` covers engines where
      # the prep steps were a no-op and there's nothing to commit.
      - name: Commit mirror-only artifacts
        run: |
          git add templates/${{ matrix.engine }}
          git commit -m "build: prepare mirror-only artifacts" --no-verify || true

      - name: Subtree split templates/${{ matrix.engine }}
        run: |
          git subtree split --prefix=templates/${{ matrix.engine }} -b split-${{ matrix.engine }}

      - name: Push to mirror
        env:
          TEMPLATES_MIRROR_TOKEN: ${{ secrets.TEMPLATES_MIRROR_TOKEN }}
        run: |
          if [ -z "$TEMPLATES_MIRROR_TOKEN" ]; then
            echo "TEMPLATES_MIRROR_TOKEN not set — skipping push (CI dry run)."
            exit 0
          fi
          git push --force \
            https://x-access-token:${TEMPLATES_MIRROR_TOKEN}@github.com/devcrocod/kotlin-docs-${{ matrix.engine }}-template.git \
            split-${{ matrix.engine }}:master
