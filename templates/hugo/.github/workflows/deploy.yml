# Build and deploy the Hugo starter to GitHub Pages.
#
# Enable this workflow by setting Settings → Pages → Source = "GitHub Actions"
# once per repository (see guides/_index.md → Deploy section). After that,
# every push to master republishes the site at https://<owner>.github.io/<repo>/.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy at a time, and let an in-flight one finish
# so we never strand a half-published commit on Pages.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pinned for reproducibility — bump in lockstep with theme.toml's min_version.
  HUGO_VERSION: 0.128.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Hugo CLI
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - id: pages
        uses: actions/configure-pages@v5

      - name: Resolve theme module
        run: hugo mod get -u

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}/"

      # Static search index over the rendered HTML — the theme loads it lazily
      # from /pagefind/ (see the kotlin-docs-hugo theme's assets/js/search.js).
      - name: Build Pagefind search index
        run: npx -y pagefind@1.5.2 --site public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
