# Build and deploy the Docusaurus starter to GitHub Pages.
#
# Enable this workflow by setting Settings → Pages → Source = "GitHub Actions"
# once per repository (see getting-started/deploy.md). After that, every push
# to master republishes the site at https://<owner>.github.io/<repo>/.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy at a time, and let an in-flight one finish
# so we never strand a half-published commit on Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # pnpm 11 (pinned in pnpm/action-setup above) requires Node >= 22.13
          # — it loads node:sqlite, a Node 22.5+ builtin. Node 20 crashes the
          # `pnpm store path` call in setup-node's cache step.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
