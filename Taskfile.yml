version: "3"

# kotlin-docs-kit build orchestration.
# Most build tasks start working only after issues #4 and #6–#11 are complete.
# `task install` is independent and works as soon as pnpm + uv are installed.

tasks:
  install:
    desc: Install all deps (Node)
    cmds:
      - pnpm install

  tokens:build:
    desc: Build design tokens (Style Dictionary)
    dir: packages/tokens
    cmds:
      - pnpm build
    sources:
      - src/**/*.json
    generates:
      - dist/**/*

  docusaurus:build:
    desc: Build Docusaurus preset
    deps: [tokens:build]
    cmds:
      - cd packages/docusaurus && pnpm build

  hugo:build:
    desc: Sync tokens into Hugo theme
    deps: [tokens:build]
    cmds:
      # All CSS (incl. fonts.css) goes through Hugo Pipes from assets/css/.
      # woff2 are served verbatim from static/fonts/ at <baseURL>/fonts/*.woff2.
      # fonts.css URLs are rewritten from "./fonts/" → "../fonts/" so the
      # concatenated bundle (emitted at <baseURL>/css/bundle.<hash>.css) resolves
      # font URLs to <baseURL>/fonts/ — correct under both root and sub-path
      # baseURLs. An absolute "/fonts/" breaks when the site is served under a
      # sub-path (e.g. /kotlin-docs-hugo-template/), which is why the logo and
      # fonts 404'd in the starter.
      - rsync -a --include='*.css' --exclude='*/' --exclude='*'
        packages/tokens/dist/ packages/hugo/assets/css/
      - sed -E -i.bak 's|url\("\./fonts/|url("../fonts/|g' packages/hugo/assets/css/fonts.css
      - rm -f packages/hugo/assets/css/fonts.css.bak
      # colors_and_type.css @imports fonts.css so single-stylesheet consumers
      # (Docusaurus) pull in the @font-face rules. Hugo's head.html instead
      # concatenates fonts.css into the bundle explicitly, so the @import would
      # resolve to a non-existent <baseURL>/css/fonts.css and 404 on every page.
      # Strip it from the Hugo copy.
      - sed -E -i.bak '/@import "\.\/fonts\.css";/d' packages/hugo/assets/css/colors_and_type.css
      - rm -f packages/hugo/assets/css/colors_and_type.css.bak
      - rsync -a --delete packages/tokens/dist/fonts/ packages/hugo/static/fonts/
      - rsync -a packages/tokens/dist/assets/ packages/hugo/static/img/
      # Generated icon partial (kt-icon.html dispatches over it). Committed to
      # the theme because it ships from git tags via the Go module proxy; the
      # CSS-only rsync filter above can never deliver an .html file.
      - rsync -a packages/tokens/dist/kt-icons.generated.html packages/hugo/layouts/partials/

  template:docusaurus:build:
    desc: Build Docusaurus template (also serves as live demo)
    deps: [docusaurus:build]
    cmds:
      - cd templates/docusaurus && pnpm build

  template:hugo:build:
    desc: Build Hugo template (also serves as live demo)
    deps: [hugo:build]
    cmds:
      - cd templates/hugo && hugo --minify
      # Build the Pagefind search index over the rendered HTML. Must run AFTER
      # hugo; the theme's assets/js/search.js loads it lazily from /pagefind/.
      - cd templates/hugo && npx -y pagefind@1.5.2 --site public

  templates:build:
    desc: Build both engine templates
    deps:
      - template:docusaurus:build
      - template:hugo:build

  docs:build:
    desc: Build the dogfood docs site (docs/)
    deps: [docusaurus:build]
    cmds:
      - cd docs && pnpm build

  docs:serve:
    desc: Run the dogfood docs site locally (http://localhost:3000)
    deps: [docusaurus:build]
    cmds:
      - cd docs && pnpm start

  lint:
    desc: Run all linters (Prettier check, ESLint, gofmt)
    cmds:
      - pnpm run format:check
      - pnpm run lint
      - 'out=$(gofmt -l packages/hugo templates/hugo); [ -z "$out" ] || { echo "$out"; exit 1; }'

  lint:fix:
    desc: Auto-fix linters where possible
    cmds:
      - pnpm run format
      - pnpm run lint:fix
      - gofmt -w packages/hugo templates/hugo

  typecheck:
    desc: Run tsc --noEmit on TypeScript packages
    cmds:
      - pnpm --filter @ktdocs/docusaurus-preset typecheck
      - pnpm --filter @ktdocs/docs-site typecheck
      - pnpm --filter kotlin-docs-docusaurus-template typecheck

  ci:
    desc: Full CI pipeline locally (smoke tests)
    cmds:
      - task: install
      - task: tokens:build
      - task: templates:build
      - task: docs:build
      # Committed generated artifacts must match their sources (icons pipeline).
      - git diff --exit-code -- packages/hugo/layouts/partials/kt-icons.generated.html packages/docusaurus/src/theme/Icon/data.generated.ts
