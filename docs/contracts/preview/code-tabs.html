<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .kt-codeblock { margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="kt-codeblock">
    <div class="kt-codeblock__header">
      <div class="kt-codeblock__tabs">
        <button class="kt-codeblock__tab kt-codeblock__tab--active">
          <svg class="kt-codeblock__file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
          Main.kt
        </button>
        <button class="kt-codeblock__tab">
          <svg class="kt-codeblock__file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
          User.kt
        </button>
        <button class="kt-codeblock__tab">
          <svg class="kt-codeblock__file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
          build.gradle.kts
        </button>
      </div>
      <div class="kt-codeblock__actions">
        <button class="kt-codeblock__action-btn" title="Wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 7 3 7 21 7"/><path d="M3 12h15a3 3 0 0 1 0 6h-4"/><polyline points="16 16 12 18 16 20"/><line x1="3" y1="17" x2="3" y2="17"/></svg></button>
        <button class="kt-codeblock__action-btn" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          copy
        </button>
      </div>
    </div>
<pre class="kt-codeblock__body" style="padding:16px 18px"><span class="kt-tok-c">// Routes are functions. No annotations needed.</span>
<span class="kt-tok-k">fun</span> <span class="kt-tok-f">Application</span>.<span class="kt-tok-f">routes</span>() = <span class="kt-tok-f">routing</span> {
  <span class="kt-tok-f">get</span>(<span class="kt-tok-s">"/users/{id}"</span>) {
    <span class="kt-tok-k">val</span> id = call.<span class="kt-tok-f">parameters</span>[<span class="kt-tok-s">"id"</span>] ?: <span class="kt-tok-k">return@</span><span class="kt-tok-f">get</span>
    call.<span class="kt-tok-f">respond</span>(userRepo.<span class="kt-tok-f">find</span>(id))
  }
}</pre>
  </div>
</div>
<div class="card">
  <!-- Single titled block: the filename is a quiet .kt-codeblock__title label
       (0.2.0 — replaces the lone fake active tab). -->
  <div class="kt-codeblock">
    <div class="kt-codeblock__header">
      <span class="kt-codeblock__title">
        <svg class="kt-codeblock__file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        settings.gradle.kts
      </span>
      <div class="kt-codeblock__actions">
        <button class="kt-codeblock__action-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          copy
        </button>
      </div>
    </div>
<pre class="kt-codeblock__body" style="padding:16px 18px"><span class="kt-tok-f">rootProject</span>.name = <span class="kt-tok-s">"my-docs"</span>
<span class="kt-tok-f">include</span>(<span class="kt-tok-s">":app"</span>)</pre>
  </div>
</div>
</body>
</html>
