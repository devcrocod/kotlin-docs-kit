<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .group { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="row"><span class="lab">Badges</span>
      <span class="kt-badge"><span class="kt-badge__dot"></span>Neutral</span>
      <span class="kt-badge kt-badge--purple"><span class="kt-badge__dot"></span>Stable</span>
      <span class="kt-badge kt-badge--pink"><span class="kt-badge__dot"></span>Preview</span>
      <span class="kt-badge kt-badge--success"><span class="kt-badge__dot"></span>Deployed</span>
      <span class="kt-badge kt-badge--warning"><span class="kt-badge__dot"></span>Deprecated</span>
      <span class="kt-badge kt-badge--danger"><span class="kt-badge__dot"></span>Removed</span>
      <span class="kt-badge kt-badge--info"><span class="kt-badge__dot"></span>New</span>
    </div>
    <div class="row"><span class="lab">Tags</span>
      <span class="kt-tag">kotlin</span>
      <span class="kt-tag">coroutines</span>
      <span class="kt-tag">v2.4.0</span>
      <span class="kt-tag">android</span>
      <span class="kt-tag">multiplatform</span>
      <span class="kt-tag">tutorial</span>
    </div>
    <div class="row"><span class="lab">Methods</span>
      <span class="kt-method kt-method--get">GET</span>
      <span class="kt-method kt-method--post">POST</span>
      <span class="kt-method kt-method--put">PUT</span>
      <span class="kt-method kt-method--patch">PATCH</span>
      <span class="kt-method kt-method--delete">DELETE</span>
    </div>
  </div>
</div>
</body>
</html>
