<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: var(--surface-0); }
  .card { background: transparent; }
  .card-grid { grid-template-columns: repeat(3, 1fr); }
</style>
</head>
<body>
<div class="card">
  <div class="card-grid">
    <a class="k-card is-hoverable">
      <div class="card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg>
      </div>
      <h3 class="card-title">Quickstart</h3>
      <p class="card-body">Build your first Kotlin server in five minutes — install, route, deploy.</p>
      <span class="card-arrow">5 min →</span>
    </a>
    <a class="k-card is-hoverable">
      <div class="card-icon" style="background: var(--color-accent-soft); color: var(--color-accent)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <h3 class="card-title">Routing</h3>
      <p class="card-body">Path params, query strings, nested routers, middleware composition.</p>
      <span class="card-arrow">Guide →</span>
    </a>
    <a class="k-card is-hoverable">
      <div class="card-icon" style="background: var(--color-info-soft); color: var(--color-info)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </div>
      <h3 class="card-title">Authentication</h3>
      <p class="card-body">API keys, OAuth, JWT — all type-safe and built into the router.</p>
      <span class="card-arrow">Guide →</span>
    </a>
  </div>
</div>
</body>
</html>
