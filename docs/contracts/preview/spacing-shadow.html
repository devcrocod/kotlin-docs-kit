<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: var(--surface-2); }
  .card { background: transparent; padding: 30px 26px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { width: 84px; height: 84px; background: var(--surface-1); border-radius: 8px; }
  .lab  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .xs   { box-shadow: var(--shadow-xs); }
  .sm   { box-shadow: var(--shadow-sm); }
  .md   { box-shadow: var(--shadow-md); }
  .lg   { box-shadow: var(--shadow-lg); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="tile"><div class="box xs"></div><span class="lab">--shadow-xs</span></div>
    <div class="tile"><div class="box sm"></div><span class="lab">--shadow-sm</span></div>
    <div class="tile"><div class="box md"></div><span class="lab">--shadow-md</span></div>
    <div class="tile"><div class="box lg"></div><span class="lab">--shadow-lg</span></div>
  </div>
</div>
</body>
</html>
