<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .group { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; width: 76px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="row"><span class="lab">Primary</span>
      <button class="kt-button kt-button--primary kt-button--sm">Install</button>
      <button class="kt-button kt-button--primary">Get started</button>
      <button class="kt-button kt-button--primary kt-button--lg">Read the docs</button>
      <button class="kt-button kt-button--primary" disabled>Disabled</button>
    </div>
    <div class="row"><span class="lab">Secondary</span>
      <button class="kt-button kt-button--secondary kt-button--sm">View source</button>
      <button class="kt-button kt-button--secondary">View example</button>
      <button class="kt-button kt-button--secondary kt-button--lg">Browse plugins</button>
    </div>
    <div class="row"><span class="lab">Ghost</span>
      <button class="kt-button kt-button--ghost kt-button--sm">Cancel</button>
      <button class="kt-button kt-button--ghost">More options</button>
      <button class="kt-button kt-button--ghost kt-button--lg">Show advanced</button>
    </div>
    <div class="row"><span class="lab">Link</span>
      <a class="kt-button kt-button--link">Read the docs →</a>
      <a class="kt-button kt-button--link">Compare versions</a>
    </div>
    <div class="row"><span class="lab">Brand</span>
      <button class="kt-button kt-button--brand">Try Kotlin in your browser</button>
      <button class="kt-button kt-button--brand kt-button--lg">Open the playground</button>
    </div>
  </div>
</div>
</body>
</html>
