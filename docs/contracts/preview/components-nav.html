<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .group { display: flex; flex-direction: column; gap: 18px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 8px; }
  .kt-docs-pager { margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div>
      <span class="lab">Tabs</span>
      <div class="kt-tabs">
        <button class="kt-tabs__tab kt-tabs__tab--active">Kotlin</button>
        <button class="kt-tabs__tab">Java</button>
        <button class="kt-tabs__tab">Groovy</button>
        <button class="kt-tabs__tab">Maven</button>
      </div>
    </div>
    <div>
      <span class="lab">Breadcrumbs</span>
      <nav class="kt-crumbs">
        <a href="#">Docs</a><span class="kt-crumbs__sep">/</span>
        <a href="#">Concepts</a><span class="kt-crumbs__sep">/</span>
        <a href="#">Routing</a><span class="kt-crumbs__sep">/</span>
        <span class="kt-crumbs__current">Nested layouts</span>
      </nav>
    </div>
    <div>
      <span class="lab">Pagination</span>
      <div class="kt-docs-pager">
        <a class="kt-docs-pager__link">
          <span class="kt-docs-pager__direction">← Previous</span>
          <span class="kt-docs-pager__title">Installation</span>
        </a>
        <a class="kt-docs-pager__link kt-docs-pager__link--next">
          <span class="kt-docs-pager__direction">Next →</span>
          <span class="kt-docs-pager__title">Project structure</span>
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
