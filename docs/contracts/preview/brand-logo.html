<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .row.wide { grid-template-columns: 1fr 1fr; }
  .panel { border: 1px solid var(--border-1); border-radius: 8px; display: grid; place-items: center; padding: 22px 18px; min-height: 110px; }
  .light { background: var(--surface-1); }
  .gray  { background: var(--surface-2); }
  .dark  { background: #101218; border-color: #1f222a; }
  .cap   { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: center; margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row">
      <div><div class="panel light"><img src="../assets/kotlin-icon-color.svg" width="64" height="64" alt="Kotlin K (color)"/></div><div class="cap">color · gradient K</div></div>
      <div><div class="panel light"><img src="../assets/kotlin-icon-black.svg" width="64" height="64" alt="Kotlin K (black)"/></div><div class="cap">black · solid</div></div>
      <div><div class="panel dark"><img src="../assets/kotlin-icon-white.svg" width="64" height="64" alt="Kotlin K (white)"/></div><div class="cap">white · solid on dark</div></div>
    </div>
    <div class="row wide">
      <div><div class="panel gray"><img src="../assets/kotlin-logo.svg" height="44" alt="Kotlin wordmark"/></div><div class="cap">wordmark · light surface</div></div>
      <div><div class="panel dark"><img src="../assets/kotlin-logo-dark.svg" height="44" alt="Kotlin wordmark dark"/></div><div class="cap">wordmark · dark surface</div></div>
    </div>
  </div>
</div>
</body>
</html>
