<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: #0E0F11; }
  .card { background: transparent; }
  .kt-codeblock { margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="kt-codeblock kt-codeblock--terminal">
    <div class="kt-codeblock__header">
      <div class="kt-codeblock__lang">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19h8"/><path d="m4 17 6-6-6-6"/></svg>
        terminal
      </div>
      <div class="kt-codeblock__actions">
        <button class="kt-codeblock__action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>copy</button>
      </div>
    </div>
<pre class="kt-codeblock__body" style="padding:18px 22px; color:#E0E1E4; font-size:13px"><span class="kt-codeblock__term-prompt">$</span> curl -fsSL get.kotlinlang.org | sh
<span class="kt-codeblock__term-comment"># installs into ~/.kotlinc</span>

<span class="kt-codeblock__term-prompt">$</span> kotlinc -version
<span style="color:#82D2CE">info: Kotlin version 2.0.0 (JRE 21)</span>

<span class="kt-codeblock__term-prompt">$</span> kotlinc hello.kt -include-runtime -d hello.jar
<span style="color:#44C97A">✓ compiled in 1.2s</span>

<span class="kt-codeblock__term-prompt">$</span> java -jar hello.jar
Hello, world!</pre>
  </div>
</div>
</body>
</html>
