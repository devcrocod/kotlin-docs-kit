<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<link rel="stylesheet" href="../components.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .group { display: flex; flex-direction: column; gap: 22px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div>
      <span class="lab">Eyebrow — immediate parent section label (fallback: parent → tab → hidden)</span>
      <p class="kt-eyebrow">Guides</p>
    </div>
    <div>
      <span class="lab">Article header — eyebrow above the H1 titlebar row seating the copy-page control</span>
      <header class="kt-article-header">
        <p class="kt-eyebrow">CLI</p>
        <div class="kt-article-header__titlebar">
          <h1 class="t-h1">Install the CLI</h1>
          <div class="kt-copy-page">
            <button class="kt-copy-page__btn" type="button" aria-haspopup="true" aria-expanded="false">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>
              <span>Copy page</span>
              <svg class="kt-copy-page__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
            </button>
          </div>
        </div>
      </header>
    </div>
    <div>
      <span class="lab">Eyebrow hidden — label would equal the page title (tab-root index pages)</span>
      <header class="kt-article-header">
        <div class="kt-article-header__titlebar">
          <h1 class="t-h1">Guides</h1>
          <div class="kt-copy-page">
            <button class="kt-copy-page__btn" type="button" aria-haspopup="true" aria-expanded="false">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>
              <span>Copy page</span>
              <svg class="kt-copy-page__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
            </button>
          </div>
        </div>
      </header>
    </div>
  </div>
</div>
</body>
</html>
