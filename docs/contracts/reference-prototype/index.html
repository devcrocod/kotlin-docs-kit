<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Kotlin Docs Theme — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="../../tokens.css"/>
<link rel="stylesheet" href="../../components.css"/>
<style>
  body { margin: 0; min-height: 100vh; }
  a, button, .sidenav-item, .codeblock-tab, .navlink, .tab { cursor: pointer; }
  .docs-shell-main p { font-size: 15px; line-height: 1.7; color: var(--fg-1); }
  .docs-shell-main h2 { margin-top: 36px; margin-bottom: 10px; }
  .docs-shell-main h3 { margin-top: 26px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="ArticlePage.jsx"></script>
<script type="text/babel" src="ApiPage.jsx"></script>
<script type="text/babel" src="ChangelogPage.jsx"></script>
<script type="text/babel" src="BlogPage.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState("home");          // home · article · api · changelog · blog
  const [activeArticle, setActiveArticle] = useState("quickstart");
  const [theme, setTheme] = useState("light");

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);

  const goArticle = (id) => { setActiveArticle(id); setRoute("article"); };

  const screenLabel =
    route === "home"      ? "01 Home"        :
    route === "article"   ? "02 Article"     :
    route === "api"       ? "03 API"         :
    route === "changelog" ? "04 Changelog"   :
    route === "blog"      ? "05 Blog post"   : "Docs";

  return (
    <div data-screen-label={screenLabel} style={{ background: "var(--surface-0)", minHeight: "100vh" }}>
      <TopNav route={route} setRoute={setRoute} theme={theme} setTheme={setTheme}/>
      {route === "home"      && <HomePage onPick={goArticle}/>}
      {route === "article"   && <ArticlePage active={activeArticle} onPick={goArticle}/>}
      {route === "api"       && <ApiPage/>}
      {route === "changelog" && <ChangelogPage/>}
      {route === "blog"      && <BlogPage/>}
      {(route === "home" || route === "changelog" || route === "blog") && <Footer/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
